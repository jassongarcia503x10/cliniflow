name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  syntax:
    name: node --check (api + lib)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Syntax-check all serverless and lib JS
        run: |
          set -e
          for f in api/*.js lib/*.js; do
            [ -e "$f" ] || continue
            echo "checking $f"
            node --check "$f"
          done
          echo "All JS files passed node --check"
