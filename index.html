<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CliniFlow · Panel de Gestión</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#04080f;color:#f1f5f9;font-family:'Plus Jakarta Sans',sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.22)}
select option{background:#1e293b;color:#fff}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.animate-in{animation:fadeIn .4s ease both}
.spin{animation:spin .8s linear infinite}
.pulse{animation:pulse 2s infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── CONFIG ──────────────────────────────────────────
const SB_URL = "https://auklwgsdybtusxncfglo.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1a2x3Z3NkeWJ0dXN4bmNmZ2xvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NzQzNzQsImV4cCI6MjA5MjU1MDM3NH0.ZTDJpbqB75S5LI_Ixr2BkP0PI8NazV51w0hXmY_fz9E";
const AI_URL = "https://api.anthropic.com/v1/messages";
const HDR = { apikey:SB_KEY, Authorization:`Bearer ${SB_KEY}`, "Content-Type":"application/json" };

// ── SUPABASE ─────────────────────────────────────────
async function dbGet(table, opts={}) {
  let url = `${SB_URL}/rest/v1/${table}?select=*`;
  if(opts.eq) Object.entries(opts.eq).forEach(([k,v])=>url+=`&${k}=eq.${encodeURIComponent(v)}`);
  if(opts.order) url+=`&order=${opts.order}`;
  if(opts.limit) url+=`&limit=${opts.limit}`;
  const r = await fetch(url,{headers:HDR});
  if(!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
  return r.json();
}
async function dbPost(table,data) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}`,{method:"POST",headers:{...HDR,Prefer:"return=representation"},body:JSON.stringify(data)});
  if(!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
  return r.json();
}
async function dbPatch(table,data,eq) {
  let url=`${SB_URL}/rest/v1/${table}?`;
  Object.entries(eq).forEach(([k,v])=>url+=`${k}=eq.${encodeURIComponent(v)}&`);
  const r = await fetch(url,{method:"PATCH",headers:{...HDR,Prefer:"return=representation"},body:JSON.stringify(data)});
  if(!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
  return r.json();
}

// ── SOFIA ────────────────────────────────────────────
function sofiaPrompt(clinic,treatments=[]) {
  const list=treatments.map(t=>
    t.price_mode==="exact"  ?`- ${t.name}: ${clinic?.currency||"€"}${t.price}`:
    t.price_mode==="from"   ?`- ${t.name}: desde ${clinic?.currency||"€"}${t.price}${t.price_max?` hasta ${clinic?.currency||"€"}${t.price_max}`:""} (varía)`:
    `- ${t.name}: valoración gratuita`
  ).join("\n");
  return `You are Sofia, virtual dental assistant for ${clinic?.name||"the clinic"} in ${clinic?.city||""}.
RULE 1: ALWAYS reply in the EXACT language the patient writes. No exceptions.
RULE 2: Warm, brief, professional — max 2 sentences per reply.
RULE 3: Always end by offering to book an appointment.
PRICES (use ONLY these):
${list||"Consultar en clínica"}`;
}

// ── UI ATOMS ─────────────────────────────────────────
const C = {
  green:  ["rgba(34,197,94,.12)","#22c55e"],
  blue:   ["rgba(59,130,246,.12)","#60a5fa"],
  yellow: ["rgba(234,179,8,.12)","#eab308"],
  red:    ["rgba(239,68,68,.12)","#ef4444"],
  purple: ["rgba(168,85,247,.12)","#c084fc"],
  orange: ["rgba(249,115,22,.12)","#fb923c"],
};
function Badge({c="blue",children}){
  const [bg,tx]=C[c]||C.blue;
  return <span style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,background:bg,color:tx}}>{children}</span>;
}
function Spinner(){
  return <div style={{display:"flex",justifyContent:"center",padding:48}}>
    <div className="spin" style={{width:32,height:32,border:"3px solid rgba(255,255,255,.08)",borderTop:"3px solid #0ea5e9",borderRadius:"50%"}}/>
  </div>;
}
function Toast({msg}){
  if(!msg)return null;
  return <div style={{position:"fixed",top:20,right:20,zIndex:9999,padding:"12px 20px",background:"rgba(34,197,94,.15)",border:"1px solid rgba(34,197,94,.3)",borderRadius:12,fontSize:13,color:"#22c55e",boxShadow:"0 10px 40px rgba(0,0,0,.5)",animation:"fadeIn .3s ease"}}>{msg}</div>;
}
function Inp({label,value,onChange,type="text",placeholder=""}){
  return <div style={{display:"flex",flexDirection:"column",gap:5}}>
    {label&&<label style={{fontSize:12,color:"rgba(255,255,255,.4)"}}>{label}</label>}
    <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      style={{padding:"11px 14px",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,color:"#fff",fontSize:14,outline:"none",fontFamily:"inherit",width:"100%"}}/>
  </div>;
}
function Btn({children,onClick,disabled,variant="primary",full,style={}}){
  const vs={
    primary:{background:"linear-gradient(135deg,#0066ff,#00d4ff)",color:"#fff",border:"none"},
    ghost:{background:"transparent",color:"#60a5fa",border:"1px solid rgba(59,130,246,.3)"},
    danger:{background:"rgba(239,68,68,.08)",color:"#ef4444",border:"1px solid rgba(239,68,68,.2)"},
    success:{background:"linear-gradient(135deg,#059669,#10d9a0)",color:"#fff",border:"none"},
  };
  return <button onClick={onClick} disabled={disabled}
    style={{padding:"10px 20px",borderRadius:10,fontFamily:"inherit",fontSize:14,fontWeight:600,cursor:disabled?"not-allowed":"pointer",opacity:disabled?.55:1,transition:"all .2s",width:full?"100%":"auto",...vs[variant],...style}}>
    {children}
  </button>;
}
function Card({children,style={}}){
  return <div style={{background:"rgba(255,255,255,.025)",border:"1px solid rgba(255,255,255,.07)",borderRadius:16,...style}}>{children}</div>;
}
function StatCard({icon,label,val,color,sub}){
  return <Card style={{padding:"20px 22px",position:"relative",overflow:"hidden"}}>
    <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${color},transparent)`}}/>
    <div style={{fontSize:22,marginBottom:8}}>{icon}</div>
    <div style={{fontSize:32,fontWeight:800,color,fontFamily:"'Syne',sans-serif"}}>{val}</div>
    <div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginTop:3}}>{label}</div>
    {sub&&<div style={{fontSize:11,color:"rgba(255,255,255,.25)",marginTop:2}}>{sub}</div>}
  </Card>;
}

// ── LOGIN ─────────────────────────────────────────────
function Login({onLogin}){
  const [email,setEmail]=useState("demo@dentaldubrovnik.hr");
  const [pass,setPass]=useState("demo123");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  async function login(){
    if(!email||!pass)return;
    setLoading(true);setErr("");
    try{
      const rows=await dbGet("clinics",{eq:{email,password_hash:pass}});
      if(rows?.length>0)onLogin(rows[0]);
      else setErr("❌ Email o contraseña incorrectos");
    }catch(e){setErr("❌ "+e.message);}
    setLoading(false);
  }

  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"radial-gradient(ellipse at 30% 50%,rgba(14,165,233,.08),transparent 60%),#04080f"}}>
    <div style={{width:"100%",maxWidth:420}} className="animate-in">
      <div style={{textAlign:"center",marginBottom:40}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:38,fontWeight:800,background:"linear-gradient(135deg,#00d4ff,#0066ff)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>CliniFlow</div>
        <div style={{fontSize:14,color:"rgba(255,255,255,.35)",marginTop:8}}>Sistema dental IA · Supabase {" "}<span style={{color:"#22c55e"}}>✅</span></div>
      </div>
      <Card style={{padding:36}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,marginBottom:4}}>Iniciar sesión</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,.35)",marginBottom:28}}>Accede al panel de tu clínica</div>
        <div style={{display:"flex",flexDirection:"column",gap:14,marginBottom:22}}>
          <Inp label="Email" value={email} onChange={setEmail} placeholder="email@clinica.com"/>
          <Inp label="Contraseña" type="password" value={pass} onChange={setPass}/>
        </div>
        {err&&<div style={{padding:"10px 14px",background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.2)",borderRadius:8,fontSize:13,color:"#fca5a5",marginBottom:14}}>{err}</div>}
        <Btn onClick={login} disabled={loading} full style={{padding:14,fontSize:15}}>
          {loading?"Verificando...":"Entrar →"}
        </Btn>
        <div style={{marginTop:18,padding:"14px 16px",background:"rgba(14,165,233,.05)",border:"1px solid rgba(14,165,233,.12)",borderRadius:10}}>
          <div style={{fontSize:11,color:"rgba(255,255,255,.35)",marginBottom:5}}>🔑 Cuenta demo:</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,.7)",fontWeight:500}}>demo@dentaldubrovnik.hr</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,.4)"}}>Contraseña: demo123</div>
        </div>
      </Card>
      <div style={{textAlign:"center",marginTop:14,fontSize:11,color:"rgba(255,255,255,.15)"}}>🔒 Supabase · West EU · Ireland</div>
    </div>
  </div>;
}

// ── DASHBOARD APP ─────────────────────────────────────
function App(){
  const [clinic,setClinic]=useState(null);
  const [tab,setTab]=useState("dashboard");
  const [leads,setLeads]=useState([]);
  const [appts,setAppts]=useState([]);
  const [doctors,setDoctors]=useState([]);
  const [treats,setTreats]=useState([]);
  const [msgs,setMsgs]=useState([]);
  const [loading,setLoading]=useState(false);
  const [toast,setToast]=useState("");
  const [chat,setChat]=useState([]);
  const [chatIn,setChatIn]=useState("");
  const [chatLoad,setChatLoad]=useState(false);
  const [newLead,setNewLead]=useState({patient_name:"",patient_phone:"",treatment_interest:""});
  const [saving,setSaving]=useState(false);
  const [menuOpen,setMenuOpen]=useState(false);
  const chatRef=useRef(null);

  useEffect(()=>{if(clinic)loadAll();},[clinic]);
  useEffect(()=>{if(clinic&&treats.length>0)setChat([{role:"assistant",content:`Dobar dan! Ja sam Sofija iz ${clinic.name} 🦷 Kako vam mogu pomoći?`}]);},[treats]);
  useEffect(()=>{if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;},[chat]);

  function boom(msg){setToast(msg);setTimeout(()=>setToast(""),3000);}

  async function loadAll(){
    setLoading(true);
    try{
      const [l,a,d,t,m]=await Promise.all([
        dbGet("leads",{eq:{clinic_id:clinic.id},order:"created_at.desc",limit:30}),
        dbGet("appointments",{eq:{clinic_id:clinic.id},order:"created_at.desc",limit:30}),
        dbGet("doctors",{eq:{clinic_id:clinic.id}}),
        dbGet("treatments",{eq:{clinic_id:clinic.id}}),
        dbGet("messages",{eq:{clinic_id:clinic.id},order:"created_at.asc",limit:50}),
      ]);
      setLeads(Array.isArray(l)?l:[]);
      setAppts(Array.isArray(a)?a:[]);
      setDoctors(Array.isArray(d)?d:[]);
      setTreats(Array.isArray(t)?t:[]);
      setMsgs(Array.isArray(m)?m:[]);
    }catch(e){boom("⚠️ "+e.message);}
    setLoading(false);
  }

  async function addLead(){
    if(!newLead.patient_name.trim())return;
    setSaving(true);
    try{
      await dbPost("leads",{...newLead,clinic_id:clinic.id,status:"nuevo",score:Math.floor(Math.random()*35)+55});
      setNewLead({patient_name:"",patient_phone:"",treatment_interest:""});
      await loadAll();
      boom("✅ Lead guardado en Supabase");
    }catch(e){boom("❌ "+e.message);}
    setSaving(false);
  }

  async function updateLead(id,status){
    try{
      await dbPatch("leads",{status},{id});
      setLeads(p=>p.map(l=>l.id===id?{...l,status}:l));
      boom("✅ Actualizado en Supabase");
    }catch(e){boom("❌ "+e.message);}
  }

  async function remind(id){
    try{
      await dbPatch("appointments",{reminded_48h:true},{id});
      setAppts(p=>p.map(a=>a.id===id?{...a,reminded_48h:true}:a));
      boom("📲 Recordatorio marcado");
    }catch(e){boom("❌ "+e.message);}
  }

  async function sendChat(){
    if(!chatIn.trim()||chatLoad)return;
    const um={role:"user",content:chatIn};
    const next=[...chat,um];
    setChat(next);setChatIn("");setChatLoad(true);
    try{
      await dbPost("messages",{clinic_id:clinic.id,patient_name:"Visitante",patient_phone:"demo",content:chatIn,direction:"inbound"});
      const res=await fetch(AI_URL,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,system:sofiaPrompt(clinic,treats),
          messages:next.slice(-8).map(m=>({role:m.role,content:m.content}))})});
      const data=await res.json();
      const reply=data.content?.[0]?.text||"...";
      setChat(p=>[...p,{role:"assistant",content:reply}]);
      await dbPost("messages",{clinic_id:clinic.id,patient_name:"Sofía IA",patient_phone:"sofia",content:reply,direction:"outbound"});
    }catch(e){setChat(p=>[...p,{role:"assistant",content:"Error: "+e.message}]);}
    setChatLoad(false);
  }

  if(!clinic)return <Login onLogin={setClinic}/>;

  const TABS=[
    {id:"dashboard",icon:"⚡",label:"Dashboard"},
    {id:"leads",    icon:"🎯",label:"Leads"},
    {id:"citas",    icon:"📅",label:"Citas"},
    {id:"doctores", icon:"👨‍⚕️",label:"Doctores"},
    {id:"precios",  icon:"💰",label:"Precios"},
    {id:"sofia",    icon:"💬",label:"Sofía IA"},
  ];
  const SC={nuevo:"blue",calificado:"green",agendado:"purple",perdido:"red"};

  const Sidebar=()=><div style={{width:224,flexShrink:0,background:"rgba(255,255,255,.018)",borderRight:"1px solid rgba(255,255,255,.06)",display:"flex",flexDirection:"column",padding:"22px 0",position:"fixed",top:0,bottom:0,left:0,zIndex:100,overflowY:"auto"}}>
    <div style={{padding:"0 18px 18px"}}>
      <div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,background:"linear-gradient(135deg,#00d4ff,#0066ff)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>CliniFlow</div>
      <div style={{fontSize:9,color:"rgba(255,255,255,.2)",marginTop:1,letterSpacing:.5}}>SUPABASE REAL · PRODUCCIÓN</div>
    </div>
    <div style={{margin:"0 10px 12px",padding:"12px 14px",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:12}}>
      <div style={{fontSize:18,marginBottom:3}}>🦷</div>
      <div style={{fontSize:13,fontWeight:700}}>{clinic.name}</div>
      <div style={{fontSize:11,color:"rgba(255,255,255,.35)",marginTop:1}}>{clinic.city}</div>
      <div style={{marginTop:7,display:"flex",gap:5,flexWrap:"wrap"}}>
        <Badge c="green">● {(clinic.plan||"basic").toUpperCase()}</Badge>
        <Badge c="blue">{clinic.currency}</Badge>
      </div>
    </div>
    <div style={{margin:"0 10px 12px",padding:"9px 12px",background:"rgba(34,197,94,.04)",border:"1px solid rgba(34,197,94,.13)",borderRadius:10}}>
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:1}}>
        <div className="pulse" style={{width:6,height:6,borderRadius:"50%",background:"#22c55e",boxShadow:"0 0 6px #22c55e"}}/>
        <span style={{color:"#22c55e",fontWeight:600,fontSize:11}}>Supabase ✅ Activo</span>
      </div>
      <div style={{fontSize:10,color:"rgba(255,255,255,.22)"}}>West EU · Ireland · Healthy</div>
    </div>
    <nav style={{flex:1,padding:"0 8px"}}>
      {TABS.map(t=><button key={t.id} onClick={()=>{setTab(t.id);setMenuOpen(false);}} style={{width:"100%",textAlign:"left",padding:"9px 12px",marginBottom:2,borderRadius:10,border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:9,background:tab===t.id?"rgba(0,100,255,.15)":"transparent",borderLeft:tab===t.id?"2px solid #3b82f6":"2px solid transparent"}}>
        <span style={{fontSize:14}}>{t.icon}</span>
        <span style={{fontSize:13,fontWeight:tab===t.id?600:400,color:tab===t.id?"#60a5fa":"rgba(255,255,255,.4)"}}>{t.label}</span>
        {t.id==="leads"&&leads.length>0&&<span style={{marginLeft:"auto",fontSize:10,background:"rgba(59,130,246,.2)",color:"#60a5fa",padding:"1px 7px",borderRadius:10}}>{leads.length}</span>}
      </button>)}
    </nav>
    <div style={{padding:"12px 10px",borderTop:"1px solid rgba(255,255,255,.05)"}}>
      <button onClick={()=>setClinic(null)} style={{width:"100%",padding:"8px",background:"rgba(239,68,68,.06)",border:"1px solid rgba(239,68,68,.15)",borderRadius:8,color:"#ef4444",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
        Cerrar sesión
      </button>
    </div>
  </div>;

  return <div style={{display:"flex",minHeight:"100vh"}}>
    <Toast msg={toast}/>
    {/* Mobile header */}
    <div style={{display:"none",position:"fixed",top:0,left:0,right:0,height:60,background:"rgba(4,8,15,.95)",borderBottom:"1px solid rgba(255,255,255,.06)",zIndex:200,alignItems:"center",justifyContent:"space-between",padding:"0 16px",backdropFilter:"blur(20px)"}}>
      <div style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,background:"linear-gradient(135deg,#00d4ff,#0066ff)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>CliniFlow</div>
      <button onClick={()=>setMenuOpen(m=>!m)} style={{background:"none",border:"none",cursor:"pointer",padding:4}}>
        <div style={{width:22,height:2,background:"#fff",marginBottom:5}}/>
        <div style={{width:22,height:2,background:"#fff",marginBottom:5}}/>
        <div style={{width:22,height:2,background:"#fff"}}/>
      </button>
    </div>

    <Sidebar/>

    <div style={{marginLeft:224,flex:1,padding:"30px 34px",minHeight:"100vh"}}>
      {loading?<Spinner/>:<>

      {/* DASHBOARD */}
      {tab==="dashboard"&&<div className="animate-in">
        <div style={{marginBottom:26}}>
          <div style={{fontSize:12,color:"rgba(255,255,255,.3)",marginBottom:3}}>{new Date().toLocaleDateString("es",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>
          <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:28,fontWeight:800,margin:0,letterSpacing:-1}}>{clinic.name} 🦷</h1>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:20}}>
          <StatCard icon="🎯" label="Leads totales" val={leads.length} color="#3b82f6" sub={`${leads.filter(l=>l.status==="calificado").length} calificados`}/>
          <StatCard icon="📅" label="Citas activas" val={appts.filter(a=>a.status!=="cancelled").length} color="#22c55e" sub="agendadas"/>
          <StatCard icon="👨‍⚕️" label="Doctores" val={doctors.length} color="#a855f7" sub="configurados"/>
          <StatCard icon="💊" label="Tratamientos" val={treats.length} color="#f97316" sub="en catálogo"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <Card>
            <div style={{padding:"14px 20px",borderBottom:"1px solid rgba(255,255,255,.06)",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14}}>🎯 Últimos leads</div>
            {leads.slice(0,5).map((l,i)=><div key={l.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 20px",borderBottom:i<4?"1px solid rgba(255,255,255,.04)":"none"}}>
              <div>
                <div style={{fontSize:14,fontWeight:500}}>{l.patient_name}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,.35)",marginTop:1}}>{l.treatment_interest||"—"}</div>
              </div>
              <Badge c={SC[l.status]||"blue"}>{l.status}</Badge>
            </div>)}
            {leads.length===0&&<div style={{padding:"20px",fontSize:13,color:"rgba(255,255,255,.3)"}}>Sin leads aún</div>}
          </Card>
          <Card>
            <div style={{padding:"14px 20px",borderBottom:"1px solid rgba(255,255,255,.06)",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14}}>📅 Últimas citas</div>
            {appts.slice(0,5).map((a,i)=><div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 20px",borderBottom:i<4?"1px solid rgba(255,255,255,.04)":"none"}}>
              <div>
                <div style={{fontSize:14,fontWeight:500}}>{a.patient_name}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,.35)",marginTop:1}}>{a.treatment}</div>
              </div>
              <div style={{fontSize:16,fontWeight:800,color:"#22c55e",fontFamily:"'Syne',sans-serif"}}>{clinic.currency}{a.price}</div>
            </div>)}
            {appts.length===0&&<div style={{padding:"20px",fontSize:13,color:"rgba(255,255,255,.3)"}}>Sin citas aún</div>}
          </Card>
        </div>
      </div>}

      {/* LEADS */}
      {tab==="leads"&&<div className="animate-in">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:26,fontWeight:800,margin:0}}>🎯 Leads reales</h1>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <Badge c="green">● {leads.length} en Supabase</Badge>
            <Btn onClick={loadAll} variant="ghost" style={{fontSize:12,padding:"6px 14px"}}>🔄 Sync</Btn>
          </div>
        </div>
        <Card style={{padding:20,marginBottom:16}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:700,marginBottom:12}}>➕ Nuevo lead</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
            <Inp placeholder="Nombre del paciente" value={newLead.patient_name} onChange={v=>setNewLead(p=>({...p,patient_name:v}))}/>
            <Inp placeholder="Teléfono / WhatsApp" value={newLead.patient_phone} onChange={v=>setNewLead(p=>({...p,patient_phone:v}))}/>
            <Inp placeholder="Tratamiento de interés" value={newLead.treatment_interest} onChange={v=>setNewLead(p=>({...p,treatment_interest:v}))}/>
          </div>
          <Btn onClick={addLead} disabled={saving||!newLead.patient_name}>{saving?"Guardando...":"💾 Guardar en Supabase"}</Btn>
        </Card>
        <Card>
          {leads.length===0&&<div style={{padding:32,textAlign:"center",color:"rgba(255,255,255,.3)"}}>Agrega tu primer lead arriba ↑</div>}
          {leads.map((l,i)=><div key={l.id} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 20px",borderBottom:i<leads.length-1?"1px solid rgba(255,255,255,.04)":"none"}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#1e3a8a,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,flexShrink:0}}>
              {(l.patient_name||"?").charAt(0).toUpperCase()}
            </div>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:14}}>{l.patient_name}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,.35)",marginTop:1}}>{l.treatment_interest||"—"} · {l.patient_phone||"—"}</div>
            </div>
            <div style={{width:80}}>
              <div style={{fontSize:10,color:"rgba(255,255,255,.3)",textAlign:"right",marginBottom:3}}>Score {l.score}%</div>
              <div style={{height:3,background:"rgba(255,255,255,.06)",borderRadius:2}}>
                <div style={{height:"100%",width:`${l.score}%`,background:l.score>79?"#22c55e":"#eab308",borderRadius:2}}/>
              </div>
            </div>
            <select value={l.status} onChange={e=>updateLead(l.id,e.target.value)}
              style={{padding:"6px 10px",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,color:"#fff",fontSize:12,cursor:"pointer",outline:"none",fontFamily:"inherit"}}>
              {["nuevo","calificado","agendado","perdido"].map(s=><option key={s}>{s}</option>)}
            </select>
          </div>)}
        </Card>
      </div>}

      {/* CITAS */}
      {tab==="citas"&&<div className="animate-in">
        <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:26,fontWeight:800,margin:"0 0 20px"}}>📅 Citas reales</h1>
        <Card>
          <div style={{padding:"14px 20px",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:13,color:"rgba(255,255,255,.4)"}}>{appts.length} citas en Supabase</span>
            <Btn onClick={loadAll} variant="ghost" style={{fontSize:12,padding:"5px 12px"}}>🔄</Btn>
          </div>
          {appts.length===0&&<div style={{padding:32,textAlign:"center",color:"rgba(255,255,255,.3)"}}>No hay citas aún</div>}
          {appts.map((a,i)=><div key={a.id} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 20px",borderBottom:i<appts.length-1?"1px solid rgba(255,255,255,.04)":"none"}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#065f46,#10b981)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>🦷</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:14}}>{a.patient_name}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,.35)",marginTop:1}}>{a.treatment} · {a.patient_phone}</div>
            </div>
            <div style={{fontSize:17,fontWeight:800,color:"#22c55e",fontFamily:"'Syne',sans-serif"}}>{clinic.currency}{a.price}</div>
            <Badge c={a.status==="confirmed"?"green":a.status==="pending"?"yellow":"red"}>
              {a.status==="confirmed"?"✅ Confirmada":a.status==="pending"?"⏳ Pendiente":"❌ Cancelada"}
            </Badge>
            {a.reminded_48h
              ?<Badge c="green">📲 Enviado</Badge>
              :<Btn onClick={()=>remind(a.id)} variant="ghost" style={{fontSize:11,padding:"5px 12px"}}>📲 Recordatorio</Btn>
            }
          </div>)}
        </Card>
      </div>}

      {/* DOCTORES */}
      {tab==="doctores"&&<div className="animate-in">
        <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:26,fontWeight:800,margin:"0 0 20px"}}>👨‍⚕️ Doctores</h1>
        {doctors.length===0&&<div style={{padding:32,textAlign:"center",color:"rgba(255,255,255,.3)"}}>No hay doctores configurados</div>}
        {doctors.map(d=><Card key={d.id} style={{padding:22,marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:48,height:48,borderRadius:"50%",background:"linear-gradient(135deg,#1e3a8a,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>👨‍⚕️</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:16}}>{d.name}</div>
              <div style={{fontSize:13,color:"rgba(255,255,255,.4)",marginTop:2}}>{d.specialty}</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,.25)",marginTop:3}}>{d.slots_per_day} citas/día · {d.work_days?.length||5} días/semana</div>
            </div>
            <div style={{textAlign:"center",padding:"10px 20px",background:"rgba(59,130,246,.09)",border:"1px solid rgba(59,130,246,.2)",borderRadius:12}}>
              <div style={{fontSize:28,fontWeight:800,color:"#60a5fa",fontFamily:"'Syne',sans-serif"}}>{d.slots_per_day*(d.work_days?.length||5)}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,.35)"}}>citas/semana</div>
            </div>
          </div>
        </Card>)}
      </div>}

      {/* PRECIOS */}
      {tab==="precios"&&<div className="animate-in">
        <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:26,fontWeight:800,margin:"0 0 20px"}}>💰 Tratamientos y precios</h1>
        <Card>
          <div style={{padding:"14px 20px",borderBottom:"1px solid rgba(255,255,255,.06)"}}>
            <span style={{fontSize:13,color:"rgba(255,255,255,.4)"}}>{treats.length} tratamientos · Sofía usa solo estos precios</span>
          </div>
          {treats.length===0&&<div style={{padding:32,textAlign:"center",color:"rgba(255,255,255,.3)"}}>No hay tratamientos</div>}
          {treats.map((t,i)=><div key={t.id} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 20px",borderBottom:i<treats.length-1?"1px solid rgba(255,255,255,.04)":"none"}}>
            <span style={{fontSize:24}}>{t.icon||"🦷"}</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:14}}>{t.name}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,.35)",marginTop:1}}>{t.duration}min · {t.price_mode==="exact"?"Precio fijo":t.price_mode==="from"?"Desde...":"Valoración gratuita"}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:20,fontWeight:800,color:"#22c55e",fontFamily:"'Syne',sans-serif"}}>
                {t.price_mode==="consult"?"Consulta":`${clinic.currency}${t.price}${t.price_mode==="from"&&t.price_max?`–${clinic.currency}${t.price_max}`:""}`}
              </div>
            </div>
          </div>)}
        </Card>
      </div>}

      {/* SOFIA */}
      {tab==="sofia"&&<div className="animate-in" style={{display:"grid",gridTemplateColumns:"1fr 360px",gap:20}}>
        <div>
          <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:26,fontWeight:800,margin:"0 0 18px"}}>💬 Mensajes en Supabase</h1>
          <Card>
            <div style={{padding:"13px 18px",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:13,color:"rgba(255,255,255,.4)"}}>{msgs.length} mensajes guardados</span>
              <Btn onClick={loadAll} variant="ghost" style={{fontSize:11,padding:"4px 10px"}}>🔄</Btn>
            </div>
            <div style={{maxHeight:440,overflowY:"auto",padding:"10px 14px"}}>
              {msgs.length===0&&<div style={{textAlign:"center",color:"rgba(255,255,255,.3)",fontSize:13,padding:24}}>Prueba el chat de Sofía →</div>}
              {msgs.map(m=><div key={m.id} style={{display:"flex",justifyContent:m.direction==="outbound"?"flex-end":"flex-start",marginBottom:9}}>
                <div style={{maxWidth:"80%",padding:"8px 12px",fontSize:12,lineHeight:1.5,borderRadius:m.direction==="outbound"?"12px 12px 3px 12px":"12px 12px 12px 3px",background:m.direction==="outbound"?"linear-gradient(135deg,#0066ff,#0044cc)":"rgba(255,255,255,.07)"}}>
                  <div style={{fontSize:10,color:"rgba(255,255,255,.35)",marginBottom:2}}>{m.patient_name}</div>
                  {m.content}
                </div>
              </div>)}
            </div>
          </Card>
        </div>
        <div>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:700,marginBottom:10}}>🤖 Sofía en vivo</div>
          <Card>
            <div style={{padding:"12px 16px",background:"rgba(0,100,255,.05)",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:34,height:34,borderRadius:"50%",background:"linear-gradient(135deg,#0066ff,#00d4ff)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>🦷</div>
              <div>
                <div style={{fontWeight:700,fontSize:13}}>Sofía · {clinic.name}</div>
                <div style={{fontSize:10,color:"#22c55e"}}>● Mensajes → Supabase real</div>
              </div>
            </div>
            <div ref={chatRef} style={{height:330,overflowY:"auto",padding:13,display:"flex",flexDirection:"column",gap:9}}>
              {chat.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                <div style={{maxWidth:"85%",padding:"8px 12px",fontSize:12,lineHeight:1.5,borderRadius:m.role==="user"?"12px 12px 3px 12px":"12px 12px 12px 3px",background:m.role==="user"?"linear-gradient(135deg,#0066ff,#0044cc)":"rgba(255,255,255,.07)"}}>{m.content}</div>
              </div>)}
              {chatLoad&&<div style={{display:"flex",gap:4}}>{[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:"rgba(255,255,255,.3)",animation:`bounce 1s ${i*.2}s infinite`}}/>)}</div>}
            </div>
            <div style={{padding:"11px 13px",borderTop:"1px solid rgba(255,255,255,.06)",display:"flex",gap:8}}>
              <input value={chatIn} onChange={e=>setChatIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendChat()} placeholder="Escribe en cualquier idioma..."
                style={{flex:1,padding:"9px 12px",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,color:"#fff",fontSize:12,outline:"none",fontFamily:"inherit"}}/>
              <button onClick={sendChat} disabled={chatLoad||!chatIn.trim()} style={{padding:"9px 14px",background:"linear-gradient(135deg,#0066ff,#00d4ff)",border:"none",borderRadius:8,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",opacity:chatLoad||!chatIn.trim()?.5:1}}>➤</button>
            </div>
          </Card>
        </div>
      </div>}

      </>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
