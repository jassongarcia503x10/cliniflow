<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CliniFlow</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#04080f;color:#f1f5f9;font-family:'Plus Jakarta Sans',sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,.22)}
select option{background:#1e293b;color:#fff}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.6)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}
.animate-in{animation:fadeIn .4s ease both}
.spin{animation:spin .8s linear infinite}
.pulse{animation:pulse 2s infinite}
.mic-on{animation:micPulse 1.2s infinite}
</style>
</head>

<div id="root"></div>

const{useState,useEffect,useRef}=React;
const SB_URL="https://auklwgsdybtusxncfglo.supabase.co";
const SB_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1a2x3Z3NkeWJ0dXN4bmNmZ2xvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NzQzNzQsImV4cCI6MjA5MjU1MDM3NH0.ZTDJpbqB75S5LI_Ixr2BkP0PI8NazV51w0hXmY_fz9E";
const sb=window.supabase.createClient(SB_URL,SB_ANON);
const HDR={apikey:SB_ANON,Authorization:"Bearer "+SB_ANON,"Content-Type":"application/json"};

async function dbGet(table,opts){
  opts=opts||{};
  let url=SB_URL+"/rest/v1/"+table+"?select=*";
  if(opts.eq)Object.entries(opts.eq).forEach(([k,v])=>{url+="&"+k+"=eq."+encodeURIComponent(v);});
  if(opts.order)url+="&order="+opts.order;
  if(opts.limit)url+="&limit="+opts.limit;
  const r=await fetch(url,{headers:HDR});
  if(!r.ok)throw new Error(r.status+": "+await r.text());
  return r.json();
}
async function dbPost(table,data){
  const r=await fetch(SB_URL+"/rest/v1/"+table,{method:"POST",headers:Object.assign({},HDR,{Prefer:"return=representation"}),body:JSON.stringify(data)});
  if(!r.ok)throw new Error(r.status+": "+await r.text());
  return r.json();
}
async function dbPatch(table,data,eq){
  let url=SB_URL+"/rest/v1/"+table+"?";
  Object.entries(eq).forEach(([k,v])=>{url+=k+"=eq."+encodeURIComponent(v)+"&";});
  const r=await fetch(url,{method:"PATCH",headers:Object.assign({},HDR,{Prefer:"return=representation"}),body:JSON.stringify(data)});
  if(!r.ok)throw new Error(r.status+": "+await r.text());
  return r.json();
}
async function dbDelete(table,eq){
  let url=SB_URL+"/rest/v1/"+table+"?";
  Object.entries(eq).forEach(([k,v])=>{url+=k+"=eq."+encodeURIComponent(v)+"&";});
  const r=await fetch(url,{method:"DELETE",headers:HDR});
  if(!r.ok)throw new Error(r.status);
}

// ── UI ATOMS ───────────────────────────────────────────────────
const CC={green:["rgba(34,197,94,.12)","#22c55e"],blue:["rgba(59,130,246,.12)","#60a5fa"],yellow:["rgba(234,179,8,.12)","#eab308"],red:["rgba(239,68,68,.12)","#ef4444"],purple:["rgba(168,85,247,.12)","#c084fc"],orange:["rgba(249,115,22,.12)","#fb923c"]};
function Badge({c="blue",children}){const[bg,tx]=CC[c]||CC.blue;return<span style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,background:bg,color:tx}}>{children}</span>;}
function Spinner(){return<div style={{display:"flex",justifyContent:"center",padding:48}}><div className="spin" style={{width:32,height:32,border:"3px solid rgba(255,255,255,.08)",borderTop:"3px solid #0ea5e9",borderRadius:"50%"}}/></div>;}
function Toast({msg}){if(!msg)return null;return<div style={{position:"fixed",top:20,right:20,zIndex:9999,padding:"12px 20px",background:"rgba(34,197,94,.15)",border:"1px solid rgba(34,197,94,.3)",borderRadius:12,fontSize:13,color:"#22c55e",boxShadow:"0 10px 40px rgba(0,0,0,.5)",animation:"fadeIn .3s ease"}}>{msg}</div>;}
function Inp({label,value,onChange,type="text",placeholder="",readOnly=false}){return<div style={{display:"flex",flexDirection:"column",gap:5}}>{label&&<label style={{fontSize:12,color:"rgba(255,255,255,.4)"}}>{label}</label>}<input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} readOnly={readOnly} style={{padding:"11px 14px",background:readOnly?"rgba(255,255,255,.03)":"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,color:readOnly?"rgba(255,255,255,.4)":"#fff",fontSize:14,outline:"none",fontFamily:"inherit",width:"100%"}}/></div>;}
function Sel({label,value,onChange,opts}){return<div style={{display:"flex",flexDirection:"column",gap:5}}>{label&&<label style={{fontSize:12,color:"rgba(255,255,255,.4)"}}>{label}</label>}<select value={value} onChange={e=>onChange(e.target.value)} style={{padding:"11px 14px",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,color:"#fff",fontSize:14,outline:"none",fontFamily:"inherit"}}>{opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select></div>;}
function Btn({children,onClick,disabled,variant="primary",full,style={}}){const vs={primary:{background:"linear-gradient(135deg,#0066ff,#00d4ff)",color:"#fff",border:"none"},ghost:{background:"transparent",color:"#60a5fa",border:"1px solid rgba(59,130,246,.3)"},danger:{background:"rgba(239,68,68,.08)",color:"#ef4444",border:"1px solid rgba(239,68,68,.2)"},success:{background:"linear-gradient(135deg,#059669,#10d9a0)",color:"#fff",border:"none"}};return<button onClick={onClick} disabled={disabled} style={{padding:"10px 20px",borderRadius:10,fontFamily:"inherit",fontSize:14,fontWeight:600,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.55:1,transition:"all .2s",width:full?"100%":"auto",...vs[variant],...style}}>{children}</button>;}
function Card({children,style={}}){return<div style={{background:"rgba(255,255,255,.025)",border:"1px solid rgba(255,255,255,.07)",borderRadius:16,...style}}>{children}</div>;}
function StatCard({icon,label,val,color,sub}){return<Card style={{padding:"20px 22px",position:"relative",overflow:"hidden"}}><div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,"+color+",transparent)"}}/><div style={{fontSize:22,marginBottom:8}}>{icon}</div><div style={{fontSize:32,fontWeight:800,color,fontFamily:"'Syne',sans-serif"}}>{val}</div><div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginTop:3}}>{label}</div>{sub&&<div style={{fontSize:11,color:"rgba(255,255,255,.25)",marginTop:2}}>{sub}</div>}</Card>;}

// ── LOGIN ──────────────────────────────────────────────────────
function Login({onLogin}){
  const[email,setEmail]=useState("");
  const[pass,setPass]=useState("");
  const[err,setErr]=useState("");
  const[load,setLoad]=useState(false);
  const[mode,setMode]=useState("login");
  const[done,setDone]=useState("");

  async function doLogin(){
    if(!email||!pass)return setErr("Completa email y contrasena");
    setLoad(true);setErr("");
    const res=await sb.auth.signInWithPassword({email,password:pass});
    if(res.error){setErr("Email o contrasena incorrectos");setLoad(false);return;}
    const user=res.data.user;
    const sess=res.data.session;

    // 1. Buscar clinic via clinic_users (usa JWT de sesion para RLS)
    try{
      const cuRes=await sb.from("clinic_users").select("clinic_id,role").eq("user_id",user.id).limit(1);
      if(cuRes.data&&cuRes.data.length>0){
        const clRes=await sb.from("clinics").select("*").eq("id",cuRes.data[0].clinic_id).limit(1);
        if(clRes.data&&clRes.data.length>0){onLogin(clRes.data[0],sess);setLoad(false);return;}
      }
    }catch(e){}

    // 2. Sin clinic_users → onboarding: crear clinica nueva via API segura
    try{
      const r=await fetch("/api/create-clinic-onboarding",{method:"POST",headers:{"Content-Type":"application/json",Authorization:"Bearer "+sess.access_token}});
      const data=await r.json();
      if(r.ok&&data.clinic){onLogin(data.clinic,sess);setLoad(false);return;}
    }catch(e){}

    setErr("No se pudo configurar tu clinica. Contacta soporte.");
    await sb.auth.signOut();
    setLoad(false);
  }

  async function doRegister(){
    if(!email||!pass)return setErr("Completa email y contrasena");
    if(pass.length<8)return setErr("La contrasena debe tener al menos 8 caracteres");
    setLoad(true);setErr("");
    const res=await sb.auth.signUp({email,password:pass,options:{emailRedirectTo:window.location.origin}});
    if(res.error){setErr(res.error.message);setLoad(false);return;}
    setDone("Revisa tu email y confirma tu cuenta. Despues inicia sesion aqui.");
    setLoad(false);
  }

  async function doReset(){
    if(!email)return setErr("Ingresa tu email");
    setLoad(true);setErr("");
    const res=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin});
    if(res.error){setErr(res.error.message);}
    else{setDone("Enviamos un link de recuperacion a "+email);}
    setLoad(false);
  }

  return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"radial-gradient(ellipse at 30% 50%,rgba(14,165,233,.08),transparent 60%),#04080f"}}>
    <div className="animate-in" style={{width:"100%",maxWidth:420}}>
      <div style={{textAlign:"center",marginBottom:36}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:38,fontWeight:800,background:"linear-gradient(135deg,#00d4ff,#0066ff)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>CliniFlow</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,.35)",marginTop:6}}>Sistema dental IA <span style={{color:"#22c55e"}}>✅</span></div>
      </div>
      <Card style={{padding:32}}>
        {done?<div style={{textAlign:"center",padding:16}}>
          <div style={{fontSize:32,marginBottom:12}}>📧</div>
          <div style={{fontSize:14,fontWeight:600,marginBottom:16,lineHeight:1.5}}>{done}</div>
          <Btn onClick={()=>{setDone("");setMode("login");}} variant="ghost">Volver al login</Btn>
        </div>:<div>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,marginBottom:4}}>{mode==="login"?"Iniciar sesion":mode==="register"?"Crear cuenta":"Recuperar contrasena"}</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,.35)",marginBottom:24}}>{mode==="login"?"Accede al panel de tu clinica":mode==="register"?"Tu clinica limpia, lista en segundos":"Te enviamos un link por email"}</div>
          <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:18}}>
            <Inp label="Email" value={email} onChange={setEmail} placeholder="tu@clinica.com"/>
            {mode!=="reset"&&<Inp label="Contrasena" type="password" value={pass} onChange={setPass} placeholder={mode==="register"?"Minimo 8 caracteres":""}/>}
          </div>
          {err&&<div style={{padding:"10px 14px",background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.2)",borderRadius:8,fontSize:13,color:"#fca5a5",marginBottom:14}}>{err}</div>}
          {mode==="login"&&<Btn onClick={doLogin} disabled={load} full style={{padding:13,fontSize:15}}>{load?"Verificando...":"Entrar"}</Btn>}
          {mode==="register"&&<Btn onClick={doRegister} disabled={load} full style={{padding:13,fontSize:15}}>{load?"Creando cuenta...":"Crear cuenta"}</Btn>}
          {mode==="reset"&&<Btn onClick={doReset} disabled={load||!email} full style={{padding:13,fontSize:15}}>{load?"Enviando...":"Enviar link"}</Btn>}
          <div style={{display:"flex",justifyContent:"space-between",marginTop:16,fontSize:12}}>
            {mode!=="login"?<button onClick={()=>{setMode("login");setErr("");}} style={{background:"none",border:"none",color:"#60a5fa",cursor:"pointer",fontFamily:"inherit",fontSize:12}}>Volver al login</button>:<span/>}
            {mode==="login"&&<button onClick={()=>{setMode("reset");setErr("");}} style={{background:"none",border:"none",color:"rgba(255,255,255,.35)",cursor:"pointer",fontFamily:"inherit",fontSize:12}}>Olvide mi contrasena</button>}
            {mode==="login"&&<button onClick={()=>{setMode("register");setErr("");}} style={{background:"none",border:"none",color:"#60a5fa",cursor:"pointer",fontFamily:"inherit",fontSize:12}}>Crear cuenta nueva</button>}
          </div>
        </div>}
      </Card>
    </div>
  </div>;
}

// ── APP ────────────────────────────────────────────────────────
function App(){
  const[clinic,setClinic]=useState(null);
  const[session,setSession]=useState(null);
  const[tab,setTab]=useState("dashboard");
  const[leads,setLeads]=useState([]);
  const[appts,setAppts]=useState([]);
  const[pendingBookings,setPendingBookings]=useState([]);
  const[doctors,setDoctors]=useState([]);
  const[treats,setTreats]=useState([]);
  const[msgs,setMsgs]=useState([]);
  const[loading,setLoading]=useState(false);
  const[toast,setToast]=useState("");
  const[chat,setChat]=useState([]);
  const[chatIn,setChatIn]=useState("");
  const[chatLoad,setChatLoad]=useState(false);
  const[newLead,setNewLead]=useState({patient_name:"",patient_phone:"",treatment_interest:""});
  const[saving,setSaving]=useState(false);
  const[confirmingId,setConfirmingId]=useState(null);
  const[sofiaMode,setSofiaMode]=useState("reception");
  const[mic,setMic]=useState(false);
  const[micStatus,setMicStatus]=useState("");
  // Doctor form
  const[editDoc,setEditDoc]=useState(null);
  const[docForm,setDocForm]=useState({name:"",specialty:"",email:"",daily_capacity:8,active:true,color:"#3b82f6",bio:""});
  const[savingDoc,setSavingDoc]=useState(false);
  // Treatment form
  const[editTreat,setEditTreat]=useState(null);
  const[treatForm,setTreatForm]=useState({name:"",price:"",price_mode:"exact",duration:30,active:true});
  const[savingTreat,setSavingTreat]=useState(false);
  // Clinic settings form
  const[clinicForm,setClinicForm]=useState({});
  const[savingClinic,setSavingClinic]=useState(false);
  const chatRef=useRef(null);

  useEffect(()=>{if(clinic)loadAll();},[clinic]);
  useEffect(()=>{
    if(clinic){
      setClinicForm({name:clinic.name||"",city:clinic.city||"",country:clinic.country||"",phone:clinic.phone||"",currency:clinic.currency||"EUR",timezone:clinic.timezone||"Europe/Madrid",language:clinic.language||"es",hours_mon_fri:clinic.hours_mon_fri||"9:00-18:00",hours_saturday:clinic.hours_saturday||"Cerrado",brand_color:clinic.brand_color||"#0066ff"});
    }
  },[clinic]);
  useEffect(()=>{if(clinic&&treats.length>0)setChat([{role:"assistant",content:"Hola! Soy Sofia de "+clinic.name+". En que te ayudo?"}]);},[treats]);
  useEffect(()=>{if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;},[chat]);

  function boom(msg){setToast(msg);setTimeout(()=>setToast(""),3500);}

  async function loadAll(){
    setLoading(true);
    try{
      const[l,a,p,d,t,m]=await Promise.all([
        dbGet("leads",{eq:{clinic_id:clinic.id},order:"created_at.desc",limit:30}),
        dbGet("appointments",{eq:{clinic_id:clinic.id},order:"created_at.desc",limit:30}),
        dbGet("pending_bookings",{eq:{clinic_id:clinic.id},order:"created_at.desc",limit:30}),
        dbGet("doctors",{eq:{clinic_id:clinic.id}}),
        dbGet("treatments",{eq:{clinic_id:clinic.id}}),
        dbGet("messages",{eq:{clinic_id:clinic.id},order:"created_at.asc",limit:50}),
      ]);
      setLeads(Array.isArray(l)?l:[]);setAppts(Array.isArray(a)?a:[]);
      setPendingBookings(Array.isArray(p)?p:[]);setDoctors(Array.isArray(d)?d:[]);
      setTreats(Array.isArray(t)?t:[]);setMsgs(Array.isArray(m)?m:[]);
    }catch(e){boom("Error cargando datos: "+e.message);}
    setLoading(false);
  }

  async function signOut(){await sb.auth.signOut();setClinic(null);setSession(null);}

  // ── CLINIC SETTINGS ─────────────────────────────────────────
  async function saveClinic(){
    setSavingClinic(true);
    try{
      // Usar sb.from con JWT de sesion para que RLS funcione
      const upd=await sb.from("clinics").update({
        name:          clinicForm.name,
        city:          clinicForm.city,
        country:       clinicForm.country,
        phone:         clinicForm.phone,
        currency:      clinicForm.currency,
        timezone:      clinicForm.timezone,
        language:      clinicForm.language,
        hours_mon_fri: clinicForm.hours_mon_fri,
        hours_saturday:clinicForm.hours_saturday,
        brand_color:   clinicForm.brand_color,
      }).eq("id",clinic.id).select();
      if(upd.error)throw new Error(upd.error.message);
      // Actualizar estado local
      const updated=upd.data&&upd.data[0]?upd.data[0]:Object.assign({},clinic,clinicForm);
      setClinic(updated);
      boom("✅ Configuracion guardada");
    }catch(e){boom("❌ Error al guardar: "+e.message);}
    setSavingClinic(false);
  }

  // ── DOCTORS CRUD ─────────────────────────────────────────────
  function resetDocForm(){setEditDoc(null);setDocForm({name:"",specialty:"",email:"",daily_capacity:8,active:true,color:"#3b82f6",bio:""});}
  function startEditDoc(d){setEditDoc(d.id);setDocForm({name:d.name||"",specialty:d.specialty||"",email:d.email||"",daily_capacity:d.daily_capacity||d.slots_per_day||8,active:d.active!==false,color:d.color||"#3b82f6",bio:d.bio||""});}
  async function saveDoc(){
    if(!docForm.name.trim())return;
    setSavingDoc(true);
    try{
      const payload={name:docForm.name,specialty:docForm.specialty,email:docForm.email||null,daily_capacity:parseInt(docForm.daily_capacity)||8,slots_per_day:parseInt(docForm.daily_capacity)||8,active:docForm.active,color:docForm.color,bio:docForm.bio||null};
      if(editDoc){await dbPatch("doctors",payload,{id:editDoc});boom("Doctor actualizado");}
      else{await dbPost("doctors",Object.assign({},payload,{clinic_id:clinic.id,created_at:new Date().toISOString()}));boom("Doctor creado");}
      resetDocForm();await loadAll();
    }catch(e){boom("❌ "+e.message);}
    setSavingDoc(false);
  }
  async function deleteDoc(id){
    if(!confirm("Eliminar este doctor?"))return;
    try{await dbDelete("doctors",{id});boom("Doctor eliminado");await loadAll();}
    catch(e){boom("❌ "+e.message);}
  }

  // ── TREATMENTS CRUD ──────────────────────────────────────────
  function resetTreatForm(){setEditTreat(null);setTreatForm({name:"",price:"",price_mode:"exact",duration:30,active:true});}
  async function saveTreat(){
    if(!treatForm.name.trim()||!treatForm.price)return;
    setSavingTreat(true);
    try{
      const p={name:treatForm.name,price:parseFloat(treatForm.price),price_mode:treatForm.price_mode,duration:parseInt(treatForm.duration)||30,active:treatForm.active};
      if(editTreat){await dbPatch("treatments",p,{id:editTreat});boom("Actualizado");}
      else{await dbPost("treatments",Object.assign({},p,{clinic_id:clinic.id,created_at:new Date().toISOString()}));boom("Creado");}
      resetTreatForm();await loadAll();
    }catch(e){boom("❌ "+e.message);}
    setSavingTreat(false);
  }
  async function deleteTreat(id){
    if(!confirm("Eliminar?"))return;
    try{await dbDelete("treatments",{id});boom("Eliminado");await loadAll();}
    catch(e){boom("❌ "+e.message);}
  }

  // ── LEADS ────────────────────────────────────────────────────
  async function addLead(){
    if(!newLead.patient_name.trim())return;setSaving(true);
    try{await dbPost("leads",Object.assign({},newLead,{clinic_id:clinic.id,status:"nuevo",score:Math.floor(Math.random()*35)+55}));setNewLead({patient_name:"",patient_phone:"",treatment_interest:""});await loadAll();boom("Lead guardado");}
    catch(e){boom("❌ "+e.message);}setSaving(false);
  }
  async function updateLead(id,status){
    try{await dbPatch("leads",{status},{id});setLeads(p=>p.map(l=>l.id===id?Object.assign({},l,{status}):l));boom("Actualizado");}
    catch(e){boom("❌ "+e.message);}
  }
  async function remind(id){
    try{await dbPatch("appointments",{reminded_48h:true},{id});setAppts(p=>p.map(a=>a.id===id?Object.assign({},a,{reminded_48h:true}):a));boom("Recordatorio marcado");}
    catch(e){boom("❌ "+e.message);}
  }
  async function confirmBooking(bookingId,action){
    setConfirmingId(bookingId);
    try{
      const r=await fetch("/api/confirm-booking",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({booking_id:bookingId,action,confirmed_by:clinic.name})});
      const data=await r.json();
      if(data.success){boom({confirm:"Cita confirmada",reject:"Rechazada",reschedule:"Para reagendar"}[action]||"OK");await loadAll();}
      else boom("Error: "+(data.error||"intenta de nuevo"));
    }catch(e){boom("Error: "+e.message);}
    setConfirmingId(null);
  }

  // ── SOFIA ────────────────────────────────────────────────────
  async function askSofia(text){
    if(!text||!text.trim()||chatLoad)return;
    const next=[...chat,{role:"user",content:text}];
    setChat(next);setChatIn("");setChatLoad(true);
    try{
      const r=await fetch("/api/sofia-chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({clinic_id:clinic.id,mode:sofiaMode,messages:next.slice(-8).map(m=>({role:m.role,content:m.content}))})});
      if(!r.ok)throw new Error("sofia-chat "+r.status);
      const data=await r.json();
      const reply=data.text||"...";
      setChat(p=>[...p,{role:"assistant",content:reply}]);
      if(window.speechSynthesis){

        const utt=new window.SpeechSynthesisUtterance(reply.replace(/[*_#]/g,"").substring(0,300));

      }

    }catch(e){setChat(p=>[...p,{role:"assistant",content:"Error: "+e.message}]);}
    setChatLoad(false);
  }

  // ── VOICE ────────────────────────────────────────────────────
  async function toggleMic(){
    if(!navigator.mediaDevices){boom("Usa Chrome o Edge para voz");return;}
    if(mic){setMic(false);setMicStatus("");return;}
    setMicStatus("Solicitando microfono...");
    let stream;
    try{stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true}});}
    catch(err){
      const msgs={NotAllowedError:"Permiso denegado. Haz clic en el candado y permite el microfono.",NotFoundError:"No se encontro microfono.",NotReadableError:"Microfono en uso por otra app."};
      const msg=msgs[err.name]||("Error: "+err.name);
      setMicStatus(msg);boom(msg);setTimeout(()=>setMicStatus(""),5000);return;
    }
    const mt=MediaRecorder.isTypeSupported("audio/webm;codecs=opus")?"audio/webm;codecs=opus":"audio/webm";
    const rec=new MediaRecorder(stream,{mimeType:mt});
    const chunks=[];
    rec.ondataavailable=e=>{if(e.data&&e.data.size>0)chunks.push(e.data);};
    rec.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      setMicStatus("Transcribiendo...");setMic(false);
      const blob=new Blob(chunks,{type:mt});
      if(blob.size<1000){setMicStatus("Audio muy corto");setTimeout(()=>setMicStatus(""),3000);return;}
      try{
        const r=await fetch("/api/sofia-voice?clinic_id="+clinic.id+"&mode="+sofiaMode,{method:"POST",headers:{"Content-Type":mt},body:blob});
        if(!r.ok){setMicStatus("Error del servidor "+r.status);setTimeout(()=>setMicStatus(""),5000);return;}
        const data=await r.json();
        if(!data.transcript){setMicStatus("Sin voz detectada");setTimeout(()=>setMicStatus(""),3000);return;}
        setMicStatus(data.transcript.substring(0,40));
        setChat(p=>[...p,{role:"user",content:data.transcript},{role:"assistant",content:data.reply}]);
        if(data.reply&&window.speechSynthesis){
          window.speechSynthesis.cancel();
          const utt=new window.SpeechSynthesisUtterance(data.reply.replace(/[*_#]/g,"").substring(0,300));
          utt.lang=clinic.language||"es-ES";utt.rate=0.93;window.speechSynthesis.speak(utt);
        }
        setTimeout(()=>setMicStatus(""),4000);
      }catch(fe){setMicStatus("Error de red");setTimeout(()=>setMicStatus(""),5000);}
    };
    setMic(true);setMicStatus("Grabando — habla ahora...");
    rec.start();
    setTimeout(()=>{if(rec.state==="recording"){rec.stop();setMicStatus("Procesando...");}},8000);
  }

        </Card>
        <Card>
          <div style={{padding:"12px 20px",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:13,color:"rgba(255,255,255,.4)"}}>{doctors.length} doctores</span>
            <Btn onClick={loadAll} variant="ghost" style={{fontSize:11,padding:"3px 10px"}}>Actualizar</Btn>
          </div>
          {doctors.length===0&&<div style={{padding:32,textAlign:"center",color:"rgba(255,255,255,.3)"}}>Agrega tu primer doctor</div>}
          {doctors.map((d,i)=><div key={d.id} style={{display:"flex",alignItems:"center",gap:14,padding:"16px 20px",borderBottom:i<doctors.length-1?"1px solid rgba(255,255,255,.04)":"none",opacity:d.active===false?0.5:1}}>
            <div style={{width:44,height:44,borderRadius:"50%",background:d.color||"#3b82f6",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>👨‍⚕️</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:14,display:"flex",alignItems:"center",gap:8}}>{d.name}<Badge c={d.active!==false?"green":"red"}>{d.active!==false?"Activo":"Inactivo"}</Badge></div>
              <div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginTop:2}}>{d.specialty||"Sin especialidad"} — {d.daily_capacity||d.slots_per_day||8} citas/dia</div>
            </div>
            <div style={{textAlign:"right",padding:"8px 14px",background:"rgba(59,130,246,.08)",border:"1px solid rgba(59,130,246,.18)",borderRadius:10}}>
              <div style={{fontSize:20,fontWeight:800,color:"#60a5fa",fontFamily:"'Syne',sans-serif"}}>{(d.daily_capacity||d.slots_per_day||8)*5}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,.3)"}}>citas/semana</div>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{startEditDoc(d);window.scrollTo(0,0);}} style={{padding:"7px 12px",background:"rgba(59,130,246,.15)",border:"1px solid rgba(59,130,246,.25)",borderRadius:7,color:"#60a5fa",fontSize:12,cursor:"pointer"}}>Editar</button>
              <button onClick={()=>deleteDoc(d.id)} style={{padding:"7px 12px",background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.2)",borderRadius:7,color:"#f87171",fontSize:12,cursor:"pointer"}}>Eliminar</button>
            </div>
          </div>)}
        </Card>
      </div>}

      {/* PRECIOS */}
      {tab==="precios"&&<div className="animate-in">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:26,fontWeight:800,margin:0}}>Tratamientos y precios</h1>
          <Btn onClick={resetTreatForm} style={{fontSize:12,padding:"6px 14px"}}>+ Nuevo</Btn>
        </div>
        <Card style={{padding:20,marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:12,color:"rgba(255,255,255,.6)"}}>{editTreat?"Editando":"Nuevo tratamiento"}</div>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:10,marginBottom:12}}>
            <Inp placeholder="Nombre *" value={treatForm.name} onChange={v=>setTreatForm(p=>Object.assign({},p,{name:v}))}/>
            <Inp placeholder="Precio" value={treatForm.price} onChange={v=>setTreatForm(p=>Object.assign({},p,{price:v}))}/>
            <Sel label="" value={treatForm.price_mode} onChange={v=>setTreatForm(p=>Object.assign({},p,{price_mode:v}))} opts={[["exact","Precio fijo"],["from","Desde..."],["consult","Consultar"]]}/>
            <Inp placeholder="Duracion (min)" value={""+treatForm.duration} onChange={v=>setTreatForm(p=>Object.assign({},p,{duration:v}))}/>
          </div>
          <div style={{display:"flex",gap:10}}>
            <Btn onClick={saveTreat} disabled={savingTreat||!treatForm.name||!treatForm.price} style={{fontSize:12,padding:"8px 16px"}}>{savingTreat?"Guardando...":(editTreat?"Actualizar":"Guardar")}</Btn>
            {editTreat&&<Btn variant="ghost" onClick={resetTreatForm} style={{fontSize:12,padding:"8px 14px"}}>Cancelar</Btn>}
          </div>
        </Card>
        <Card>
          <div style={{padding:"12px 20px",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:13,color:"rgba(255,255,255,.4)"}}>{treats.length} tratamientos</span>
            <Btn onClick={loadAll} variant="ghost" style={{fontSize:11,padding:"3px 10px"}}>Actualizar</Btn>
          </div>
          {treats.length===0&&<div style={{padding:32,textAlign:"center",color:"rgba(255,255,255,.3)"}}>Agrega tu primer tratamiento</div>}
          {treats.map((t,i)=><div key={t.id} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 20px",borderBottom:i<treats.length-1?"1px solid rgba(255,255,255,.04)":"none",opacity:t.active===false?0.45:1}}>
            <span style={{fontSize:22}}>🦷</span>
            <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>{t.name}</div><div style={{fontSize:11,color:"rgba(255,255,255,.35)",marginTop:2}}>{(t.duration||30)+" min  "+(t.price_mode==="exact"?"Precio fijo":t.price_mode==="from"?"Desde":"Consultar")}</div></div>
            <div style={{fontSize:19,fontWeight:800,color:"#22c55e",fontFamily:"'Syne',sans-serif",minWidth:80,textAlign:"right"}}>{t.price_mode==="consult"?"Consulta":curr+" "+t.price}</div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{setEditTreat(t.id);setTreatForm({name:t.name,price:t.price||"",price_mode:t.price_mode||"exact",duration:t.duration||30,active:t.active!==false});}} style={{padding:"6px 12px",background:"rgba(59,130,246,.15)",border:"1px solid rgba(59,130,246,.25)",borderRadius:7,color:"#60a5fa",fontSize:12,cursor:"pointer"}}>Editar</button>
              <button onClick={()=>deleteTreat(t.id)} style={{padding:"6px 12px",background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.2)",borderRadius:7,color:"#f87171",fontSize:12,cursor:"pointer"}}>Eliminar</button>
            </div>
          </div>)}
        </Card>
      </div>}

      {/* SOFIA */}
      {tab==="sofia"&&<div className="animate-in">
        <div style={{display:"flex",gap:8,marginBottom:20,padding:"12px 16px",background:"rgba(255,255,255,.025)",borderRadius:12,border:"1px solid rgba(255,255,255,.07)",alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:"rgba(255,255,255,.4)",marginRight:4}}>Modo:</span>
          {[["reception","Recepcion"],["doctor","Dr. Copiloto"],["reports","Reportes"]].map(([m,label])=>
            <button key={m} onClick={()=>{setSofiaMode(m);setChat([{role:"assistant",content:{reception:"Hola! Soy Sofia de "+clinic.name+". En que te ayudo?",doctor:"Buenos dias doctor. Soy tu copiloto clinico.",reports:"Hola! Puedo darte metricas de la clinica."}[m]}]);}} style={{padding:"6px 14px",borderRadius:8,border:"none",cursor:"pointer",background:sofiaMode===m?"linear-gradient(135deg,"+bc+",#00d4ff)":"rgba(255,255,255,.06)",color:sofiaMode===m?"#fff":"rgba(255,255,255,.5)",fontSize:13,fontWeight:sofiaMode===m?700:400,transition:"all .2s"}}>{label}</button>
          )}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 380px",gap:20}}>
          <div>
            <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,margin:"0 0 14px"}}>Mensajes en Supabase</h1>
            <Card>
              <div style={{padding:"13px 18px",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:13,color:"rgba(255,255,255,.4)"}}>{msgs.length} mensajes</span>
                <Btn onClick={loadAll} variant="ghost" style={{fontSize:11,padding:"4px 10px"}}>Actualizar</Btn>
              </div>
              <div style={{maxHeight:440,overflowY:"auto",padding:"10px 14px"}}>
                {msgs.length===0&&<div style={{textAlign:"center",color:"rgba(255,255,255,.3)",fontSize:13,padding:24}}>Prueba el chat de Sofia</div>}
                {msgs.map(m=><div key={m.id} style={{display:"flex",justifyContent:m.direction==="outbound"?"flex-end":"flex-start",marginBottom:9}}>
                  <div style={{maxWidth:"80%",padding:"8px 12px",fontSize:12,lineHeight:1.5,borderRadius:m.direction==="outbound"?"12px 12px 3px 12px":"12px 12px 12px 3px",background:m.direction==="outbound"?"linear-gradient(135deg,"+bc+",#0044cc)":"rgba(255,255,255,.07)"}}>
                    <div style={{fontSize:10,color:"rgba(255,255,255,.35)",marginBottom:2}}>{m.patient_name}</div>
                    {m.content}
                  </div>
                </div>)}
              </div>
            </Card>
          </div>
          <div>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:700,marginBottom:10}}>Sofia en vivo</div>
            <Card>
              <div style={{padding:"12px 16px",background:"rgba(0,100,255,.05)",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:34,height:34,borderRadius:"50%",background:"linear-gradient(135deg,"+bc+",#00d4ff)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>🦷</div>
                <div>
                  <div style={{fontWeight:700,fontSize:13}}>Sofia — {clinic.name}</div>
                  <div style={{fontSize:10,color:"#22c55e"}}>Activa · {sofiaMode}</div>
                </div>
                {micStatus&&<div style={{marginLeft:"auto",fontSize:11,color:mic?"#22c55e":"#60a5fa",maxWidth:130,textAlign:"right",lineHeight:1.3}}>{micStatus}</div>}
              </div>
              <div ref={chatRef} style={{height:310,overflowY:"auto",padding:13,display:"flex",flexDirection:"column",gap:9}}>
                {chat.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                  <div style={{maxWidth:"88%",padding:"8px 12px",fontSize:12,lineHeight:1.5,borderRadius:m.role==="user"?"12px 12px 3px 12px":"12px 12px 12px 3px",background:m.role==="user"?"linear-gradient(135deg,"+bc+",#0044cc)":"rgba(255,255,255,.07)"}}>{m.content}</div>
                </div>)}
                {chatLoad&&<div style={{display:"flex",gap:4,padding:4}}>{[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:"rgba(255,255,255,.3)",animation:"bounce 1s "+(i*0.2)+"s infinite"}}/>)}</div>}
              </div>
              <div style={{padding:"12px 14px",borderTop:"1px solid rgba(255,255,255,.08)"}}>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <input value={chatIn} onChange={e=>setChatIn(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")sendChat();}} placeholder={mic?"Grabando...":"Escribe o habla con Sofia..."} style={{flex:1,padding:"10px 13px",background:"rgba(255,255,255,.06)",border:"1px solid "+(mic?"rgba(34,197,94,.5)":"rgba(255,255,255,.12)"),borderRadius:9,color:"#fff",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
                  <button onClick={toggleMic} className={mic?"mic-on":""} style={{width:42,height:42,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:mic?"#ef4444":"rgba(255,255,255,.1)",border:"2px solid "+(mic?"#ef4444":"rgba(255,255,255,.2)"),borderRadius:10,cursor:"pointer",fontSize:20,transition:"all .2s"}}>{mic?"⏹":"🎤"}</button>
                  <button onClick={sendChat} disabled={chatLoad||!chatIn.trim()} style={{width:42,height:42,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,"+bc+",#00d4ff)",border:"none",borderRadius:9,color:"#fff",fontSize:18,cursor:"pointer",opacity:chatLoad||!chatIn.trim()?0.4:1}}>➤</button>
                </div>
              </div>
            </Card>
          </div>
        </div>
      </div>}

      {/* CONFIGURACION */}
      {tab==="config"&&<div className="animate-in">
        <div style={{marginBottom:24}}>
          <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:26,fontWeight:800,margin:0}}>Configuracion de clinica</h1>
          <div style={{fontSize:13,color:"rgba(255,255,255,.35)",marginTop:6}}>Estos datos los usa Sofia, el dashboard y los recordatorios automaticamente.</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <Card style={{padding:24}}>
              <div style={{fontSize:14,fontWeight:700,marginBottom:16,color:"#60a5fa"}}>Informacion basica</div>
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <Inp label="Nombre de la clinica *" value={clinicForm.name||""} onChange={v=>setClinicForm(p=>Object.assign({},p,{name:v}))} placeholder="Mi Clinica Dental"/>
                <Inp label="Ciudad" value={clinicForm.city||""} onChange={v=>setClinicForm(p=>Object.assign({},p,{city:v}))} placeholder="Madrid"/>
                <Inp label="Pais" value={clinicForm.country||""} onChange={v=>setClinicForm(p=>Object.assign({},p,{country:v}))} placeholder="ES"/>
                <Inp label="Telefono / WhatsApp" value={clinicForm.phone||""} onChange={v=>setClinicForm(p=>Object.assign({},p,{phone:v}))} placeholder="+34 600 000 000"/>
              </div>
            </Card>
            <Card style={{padding:24}}>
              <div style={{fontSize:14,fontWeight:700,marginBottom:16,color:"#60a5fa"}}>Horarios de atencion</div>
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <Inp label="Lunes a Viernes" value={clinicForm.hours_mon_fri||""} onChange={v=>setClinicForm(p=>Object.assign({},p,{hours_mon_fri:v}))} placeholder="9:00-18:00"/>
                <Inp label="Sabados" value={clinicForm.hours_saturday||""} onChange={v=>setClinicForm(p=>Object.assign({},p,{hours_saturday:v}))} placeholder="9:00-14:00 o Cerrado"/>
              </div>
            </Card>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <Card style={{padding:24}}>
              <div style={{fontSize:14,fontWeight:700,marginBottom:16,color:"#60a5fa"}}>Configuracion regional</div>
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <Sel label="Moneda" value={clinicForm.currency||"EUR"} onChange={v=>setClinicForm(p=>Object.assign({},p,{currency:v}))} opts={[["EUR","EUR — Euro"],["USD","USD — Dolar"],["GBP","GBP — Libra"],["HRK","HRK — Kuna"],["DOP","DOP — Peso Dominicano"],["CRC","CRC — Colon"]]}/>
                <Sel label="Idioma de Sofia" value={clinicForm.language||"es"} onChange={v=>setClinicForm(p=>Object.assign({},p,{language:v}))} opts={[["es","Espanol"],["en","English"],["hr","Hrvatski"],["de","Deutsch"],["fr","Francais"],["pt","Portugues"]]}/>
                <Sel label="Zona horaria" value={clinicForm.timezone||"Europe/Madrid"} onChange={v=>setClinicForm(p=>Object.assign({},p,{timezone:v}))} opts={[["Europe/Madrid","Madrid / Barcelona"],["Europe/Zagreb","Zagreb / Belgrado"],["America/El_Salvador","El Salvador / Costa Rica"],["America/Santo_Domingo","Santo Domingo"],["America/New_York","Nueva York"],["America/Los_Angeles","Los Angeles"],["Europe/London","Londres"]]}/>
              </div>
            </Card>
            <Card style={{padding:24}}>
              <div style={{fontSize:14,fontWeight:700,marginBottom:16,color:"#60a5fa"}}>Personalizacion</div>
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <div>
                  <label style={{fontSize:12,color:"rgba(255,255,255,.4)",display:"block",marginBottom:5}}>Color de marca</label>
                  <div style={{display:"flex",gap:10,alignItems:"center"}}>
                    <input type="color" value={clinicForm.brand_color||"#0066ff"} onChange={e=>setClinicForm(p=>Object.assign({},p,{brand_color:e.target.value}))} style={{width:44,height:44,padding:2,background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,cursor:"pointer"}}/>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {["#0066ff","#22c55e","#a855f7","#f59e0b","#ef4444","#06b6d4"].map(c=><button key={c} onClick={()=>setClinicForm(p=>Object.assign({},p,{brand_color:c}))} style={{width:26,height:26,borderRadius:6,background:c,border:(clinicForm.brand_color||"#0066ff")===c?"2px solid #fff":"2px solid transparent",cursor:"pointer"}}/>)}
                    </div>
                  </div>
                  <div style={{marginTop:8,padding:"8px 12px",background:"rgba(255,255,255,.03)",borderRadius:8,fontSize:12,color:"rgba(255,255,255,.4)"}}>
                    Vista previa: <span style={{color:clinicForm.brand_color||"#0066ff",fontWeight:700}}>CliniFlow — {clinicForm.name||"Tu Clinica"}</span>
                  </div>
                </div>
              </div>
            </Card>
            <Btn onClick={saveClinic} disabled={savingClinic||!clinicForm.name} full style={{padding:14,fontSize:15}}>{savingClinic?"Guardando...":"Guardar configuracion"}</Btn>
            <Inp label="Email (solo lectura)" value={clinic.email||""} onChange={()=>{}} readOnly placeholder="email de la cuenta"/>
          </div>
        </div>
      </div>}

      </>}
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
